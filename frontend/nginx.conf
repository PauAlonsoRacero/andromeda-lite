server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip para assets estáticos
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;

    # Proxy /api → backend FastAPI
    # En Docker Compose, 'backend' es el nombre del servicio
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Necesario para SSE: desactivar el buffering
        # Sin esto, nginx acumula los chunks SSE y el streaming no funciona
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;   # > timeout de Ollama (120s) + merger
    }

    # SPA fallback: todas las rutas van a index.html
    # index.html NUNCA se cachea — así siempre apunta al JS/CSS más reciente
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Cache agresivo SOLO para assets con hash en el nombre (generados por Vite)
    location ~* \.(js|css|png|jpg|gif|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
