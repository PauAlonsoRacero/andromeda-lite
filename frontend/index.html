<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/andromeda-logo.png" />
  <title>Andromeda — AI Orchestration</title>
  <!-- build:20260601171759 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>" />
  <script>
    // Capturador global: si la app crashea, mostrar el error en vez de pantalla negra
    (function () {
      function showFatal(msg) {
        if (document.getElementById('fatal-err')) return
        var d = document.createElement('div')
        d.id = 'fatal-err'
        d.style.cssText = 'position:fixed;inset:0;z-index:99999;background:#0a0a0f;color:#eee;' +
          'font-family:Segoe UI,sans-serif;padding:34px;overflow:auto'
        d.innerHTML = '<h2 style="color:#f87171;margin:0 0 10px">Error en la interfaz</h2>' +
          '<p style="color:#a8a8b2;font-size:13px">Haz una captura de esto y compártela para diagnóstico:</p>' +
          '<pre style="background:#16161d;padding:14px;border-radius:10px;font-size:11.5px;' +
          'white-space:pre-wrap;color:#fca5a5">' + msg.replace(/</g,'&lt;') + '</pre>'
        document.body.appendChild(d)
      }
      window.addEventListener('error', function (e) {
        showFatal((e.message || 'Error') + '\n' + (e.filename || '') + ':' + (e.lineno || '') +
          (e.error && e.error.stack ? '\n\n' + e.error.stack : ''))
      })
      window.addEventListener('unhandledrejection', function (e) {
        var r = e.reason || {}
        // Los fallos de red de axios son normales (Ollama offline): no son fatales
        if (r.isAxiosError || (r.message || '').indexOf('Network') >= 0) return
        showFatal('Promesa sin capturar: ' + (r.stack || r.message || String(r)))
      })
    })()
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/index.jsx"></script>
</body>
</html>
