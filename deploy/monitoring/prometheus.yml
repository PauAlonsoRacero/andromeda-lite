# Configuración de scrape de Prometheus para Andromeda.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: andromeda-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8000"]   # backend local (dev)
        labels:
          service: andromeda
          env: dev
