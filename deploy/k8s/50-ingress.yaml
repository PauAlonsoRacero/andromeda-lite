# Ingress: enruta / al frontend y /api al backend bajo un único host.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: andromeda
  namespace: andromeda
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: andromeda.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: andromeda-backend
                port: { number: 8000 }
          - path: /
            pathType: Prefix
            backend:
              service:
                name: andromeda-frontend
                port: { number: 80 }
