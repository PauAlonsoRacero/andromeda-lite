# Autoescalado horizontal del backend según uso de CPU.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: andromeda-backend
  namespace: andromeda
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: andromeda-backend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
