apiVersion: apps/v1
kind: Deployment
metadata:
  name: andromeda-backend
  namespace: andromeda
  labels: { app: andromeda-backend }
spec:
  replicas: 2                      # 2 réplicas → tolerancia a fallos + balanceo
  selector:
    matchLabels: { app: andromeda-backend }
  template:
    metadata:
      labels: { app: andromeda-backend }
      annotations:
        # Indica a Prometheus que scrapee este pod en /metrics.
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: andromeda-backend:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: andromeda-config
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
          livenessProbe:
            httpGet: { path: /api/health, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /api/health, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: andromeda-backend
  namespace: andromeda
  labels: { app: andromeda-backend }
spec:
  selector: { app: andromeda-backend }
  ports:
    - name: http
      port: 8000
      targetPort: 8000
