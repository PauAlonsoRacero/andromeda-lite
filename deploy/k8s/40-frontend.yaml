apiVersion: apps/v1
kind: Deployment
metadata:
  name: andromeda-frontend
  namespace: andromeda
  labels: { app: andromeda-frontend }
spec:
  replicas: 2
  selector:
    matchLabels: { app: andromeda-frontend }
  template:
    metadata:
      labels: { app: andromeda-frontend }
    spec:
      containers:
        - name: frontend
          image: andromeda-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "250m", memory: "128Mi" }
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: andromeda-frontend
  namespace: andromeda
spec:
  selector: { app: andromeda-frontend }
  ports:
    - port: 80
      targetPort: 80
